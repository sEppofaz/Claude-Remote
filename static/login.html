<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude Remote – Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #7c3aed;
    --primary-dark: #5b21b6;
    --bg: #f5f3ff;
    --surface: #fff;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #e5e7eb;
    --danger: #dc2626;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body {
    height: 100%; background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
  }
  .card {
    background: var(--surface); border-radius: 20px;
    padding: 32px 24px; width: 100%; max-width: 360px;
    box-shadow: 0 4px 24px rgba(124,58,237,.12);
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .logo {
    width: 64px; height: 64px; border-radius: 16px;
    background: var(--primary); display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 36px; height: 36px; fill: #fff; }
  h1 { font-size: 20px; font-weight: 700; color: var(--text); }
  form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: var(--muted); }
  input[type="password"] {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 16px; font-family: inherit; background: var(--bg); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  input[type="password"]:focus { border-color: var(--primary); }
  .error {
    display: none; font-size: 13px; color: var(--danger);
    background: #fef2f2; border: 1px solid #fca5a5;
    padding: 8px 12px; border-radius: 8px; text-align: center;
  }
  .error.show { display: block; }
  button[type="submit"] {
    width: 100%; padding: 14px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
  }
  button[type="submit"]:active { background: var(--primary-dark); transform: scale(.98); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
  </div>
  <h1>Claude Remote</h1>
  <form method="post" action="login">
    <input type="text" name="username" value="claude-remote" autocomplete="username" style="position:absolute;opacity:0;height:0;width:0;pointer-events:none;tabindex:-1">
    <div class="field">
      <label for="pw">Passwort</label>
      <input type="password" id="pw" name="password" autocomplete="current-password"
             placeholder="••••••••" autofocus required>
    </div>
    <div class="error" id="err">Falsches Passwort</div>
    <button type="submit">Einloggen</button>
  </form>
</div>
<script>
  if (new URLSearchParams(location.search).get("error")) {
    document.getElementById("err").classList.add("show");
    document.getElementById("pw").focus();
  }
</script>
</body>
</html>
